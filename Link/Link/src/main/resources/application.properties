spring.application.name=Link

server.port=${PORT:8080}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# ===============================
# NEON / RENDER - Produccion
# Render debe enviar estos valores mediante Environment Variables
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.security.user.name=disable
spring.security.user.password=disabled

# ===============================
# GROQ AI
# ===============================
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.1-8b-instant}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
